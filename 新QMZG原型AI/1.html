<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>启蒙之光 qmzg-v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .active-tab {
            color: #6366f1;
            position: relative;
        }

        .active-tab::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 3px;
            background-color: #6366f1;
            border-radius: 2px;
        }

        .card-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24">

    <!-- 页面容器 -->
    <div id="app">
        
        <!-- 首页视图 -->
        <div id="home-view" class="view">
            <!-- 顶部导航 -->
            <header class="bg-gradient-to-r from-green-400 to-green-500 p-6 pt-10 text-white rounded-b-[2rem] shadow-lg">
                <h1 class="text-2xl font-bold text-center">启蒙之光</h1>
                <p class="text-center text-sm opacity-90 mt-1">让每个孩子都能拥抱智能时代</p>
            </header>

            <main class="px-5 mt-[-20px]">
                <!-- 登录引导卡片 (优化版) -->
                <div class="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl p-6 text-white shadow-xl card-shadow relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="flex items-center space-x-4">
                            <div class="bg-white/20 p-3 rounded-2xl">
                                <i class="fas fa-unlock-alt text-2xl"></i>
                            </div>
                            <div>
                                <h2 class="text-lg font-bold">需要登录查看</h2>
                                <p class="text-xs opacity-80">登录后即可查看你的学习数据和进度</p>
                            </div>
                        </div>
                        <button onclick="mockLogin()" class="mt-6 w-full bg-white text-indigo-600 font-bold py-3 rounded-xl shadow-md active:scale-95 transition-transform">
                            立即登录
                        </button>
                    </div>
                    <!-- 装饰圆圈 -->
                    <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-white/10 rounded-full"></div>
                </div>

                <!-- 搜索框 -->
                <div class="mt-6 relative">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                        <i class="fas fa-search text-gray-400"></i>
                    </div>
                    <input type="text" placeholder="搜索游戏、故事、创作工具..." 
                           class="w-full bg-white border-none py-4 pl-12 pr-4 rounded-2xl shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                </div>

                <!-- 今日推荐 -->
                <section class="mt-8">
                    <div class="flex justify-between items-end mb-4">
                        <h3 class="text-lg font-bold flex items-center">
                            <span class="w-1.5 h-6 bg-indigo-500 rounded-full mr-2"></span>
                            今日推荐
                        </h3>
                        <span class="text-xs text-gray-400">基于你的学习进度</span>
                    </div>
                    <div class="flex space-x-4 overflow-x-auto no-scrollbar pb-2">
                        <div class="min-w-[140px] bg-white p-3 rounded-2xl shadow-sm">
                            <div class="w-full h-24 bg-blue-100 rounded-xl mb-2 flex items-center justify-center">
                                <i class="fas fa-rocket text-blue-400 text-2xl"></i>
                            </div>
                            <p class="text-sm font-medium">趣味编程</p>
                        </div>
                        <div class="min-w-[140px] bg-white p-3 rounded-2xl shadow-sm">
                            <div class="w-full h-24 bg-orange-100 rounded-xl mb-2 flex items-center justify-center">
                                <i class="fas fa-palette text-orange-400 text-2xl"></i>
                            </div>
                            <p class="text-sm font-medium">AI 绘本</p>
                        </div>
                        <div class="min-w-[140px] bg-white p-3 rounded-2xl shadow-sm">
                            <div class="w-full h-24 bg-purple-100 rounded-xl mb-2 flex items-center justify-center">
                                <i class="fas fa-music text-purple-400 text-2xl"></i>
                            </div>
                            <p class="text-sm font-medium">智能旋律</p>
                        </div>
                    </div>
                </section>

                <!-- 学习地图入口 -->
                <section class="mt-8">
                    <div class="bg-gradient-to-r from-cyan-400 to-blue-500 rounded-3xl p-6 text-white shadow-lg flex justify-between items-center relative overflow-hidden">
                        <div class="z-10">
                            <span class="bg-white/20 text-[10px] px-2 py-1 rounded-full uppercase tracking-wider">继续闯关</span>
                            <h2 class="text-2xl font-bold mt-2">学习地图</h2>
                            <p class="text-sm opacity-90 mt-1">数学王国 - 第3关正在等你！</p>
                            <button class="mt-4 bg-white text-blue-600 px-5 py-2 rounded-full font-bold text-sm shadow-md active:scale-95 transition-all">
                                开始闯关 <i class="fas fa-arrow-right ml-1"></i>
                            </button>
                        </div>
                        <div class="opacity-20 transform rotate-12 -mr-4">
                            <i class="fas fa-map-marked-alt text-8xl"></i>
                        </div>
                    </div>
                </section>
                
                <!-- 快速入口 (原图功能保留) -->
                <section class="mt-8">
                    <h3 class="text-lg font-bold flex items-center mb-4">
                        <span class="w-1.5 h-6 bg-purple-500 rounded-full mr-2"></span>
                        快速入口
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div class="flex flex-col items-center">
                            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-indigo-500 mb-1">
                                <i class="fas fa-book-open"></i>
                            </div>
                            <span class="text-xs text-gray-500">教材</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-green-500 mb-1">
                                <i class="fas fa-video"></i>
                            </div>
                            <span class="text-xs text-gray-500">课堂</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-red-500 mb-1">
                                <i class="fas fa-flask"></i>
                            </div>
                            <span class="text-xs text-gray-500">实验</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-yellow-500 mb-1">
                                <i class="fas fa-users"></i>
                            </div>
                            <span class="text-xs text-gray-500">小组</span>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <!-- 学习视图 (默认隐藏) -->
        <div id="study-view" class="view hidden">
            <header class="p-6 pt-10 text-center">
                <h1 class="text-xl font-bold text-gray-800">学习地图</h1>
            </header>

            <main class="px-5 space-y-4">
                <!-- AI 工具区 -->
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-blue-50 flex items-center justify-between active:bg-gray-50 transition-colors">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-500">
                            <i class="fas fa-file-signature text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-800">AI作业助手</h3>
                            <p class="text-xs text-gray-400">拍照搜题·智能解答</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-gray-300"></i>
                </div>

                <div class="bg-white rounded-2xl p-5 shadow-sm border border-red-50 flex items-center justify-between active:bg-gray-50 transition-colors">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center text-red-500">
                            <i class="fas fa-book text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-800">我的错题本</h3>
                            <p class="text-xs text-gray-400">错题整理·薄弱分析</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-gray-300"></i>
                </div>

                <div class="bg-white rounded-2xl p-5 shadow-sm border border-orange-50 flex items-center justify-between active:bg-gray-50 transition-colors">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center text-orange-500">
                            <i class="fas fa-bullseye text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-800">薄弱点诊断</h3>
                            <p class="text-xs text-gray-400">AI分析·个性学习</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-gray-300"></i>
                </div>

                <!-- 成就统计区 (优化为 2x2 网格) -->
                <div class="mt-8">
                    <h3 class="text-lg font-bold mb-4">我的成就</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gradient-to-br from-indigo-400 to-indigo-600 p-5 rounded-3xl text-white shadow-md relative overflow-hidden">
                            <div class="relative z-10">
                                <p class="text-2xl font-bold">0</p>
                                <p class="text-xs opacity-80">已完成</p>
                            </div>
                            <i class="fas fa-trophy absolute -right-2 -bottom-2 text-4xl opacity-20"></i>
                        </div>
                        <div class="bg-gradient-to-br from-purple-400 to-purple-600 p-5 rounded-3xl text-white shadow-md relative overflow-hidden">
                            <div class="relative z-10">
                                <p class="text-2xl font-bold">0</p>
                                <p class="text-xs opacity-80">总星星</p>
                            </div>
                            <i class="fas fa-star absolute -right-2 -bottom-2 text-4xl opacity-20"></i>
                        </div>
                        <div class="bg-gradient-to-br from-pink-400 to-pink-600 p-5 rounded-3xl text-white shadow-md relative overflow-hidden">
                            <div class="relative z-10">
                                <p class="text-2xl font-bold">0</p>
                                <p class="text-xs opacity-80">完美通关</p>
                            </div>
                            <i class="fas fa-check-double absolute -right-2 -bottom-2 text-4xl opacity-20"></i>
                        </div>
                        <div class="bg-gradient-to-br from-blue-400 to-blue-600 p-5 rounded-3xl text-white shadow-md relative overflow-hidden">
                            <div class="relative z-10">
                                <p class="text-2xl font-bold">0</p>
                                <p class="text-xs opacity-80">勋章</p>
                            </div>
                            <i class="fas fa-medal absolute -right-2 -bottom-2 text-4xl opacity-20"></i>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- 底部导航栏 -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 flex justify-around items-center pt-3 pb-safe shadow-2xl z-50">
            <button onclick="switchView('home')" id="tab-home" class="flex flex-col items-center space-y-1 active-tab">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] font-medium">首页</span>
            </button>
            <button onclick="switchView('study')" id="tab-study" class="flex flex-col items-center space-y-1 text-gray-400">
                <i class="fas fa-book-reader text-lg"></i>
                <span class="text-[10px] font-medium">学习</span>
            </button>
            <button class="flex flex-col items-center space-y-1 text-gray-400">
                <i class="fas fa-gamepad text-lg"></i>
                <span class="text-[10px] font-medium">游戏</span>
            </button>
            <button class="flex flex-col items-center space-y-1 text-gray-400">
                <i class="fas fa-wand-magic-sparkles text-lg"></i>
                <span class="text-[10px] font-medium">创作</span>
            </button>
            <button class="flex flex-col items-center space-y-1 text-gray-400">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] font-medium">我的</span>
            </button>
        </nav>
    </div>

    <!-- 模拟消息框 -->
    <div id="toast" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-2 rounded-full text-sm shadow-xl opacity-0 transition-opacity pointer-events-none z-[100]">
        提示信息
    </div>

    <script>
        // 视图切换逻辑
        function switchView(viewName) {
            const homeView = document.getElementById('home-view');
            const studyView = document.getElementById('study-view');
            const tabHome = document.getElementById('tab-home');
            const tabStudy = document.getElementById('tab-study');

            if (viewName === 'home') {
                homeView.classList.remove('hidden');
                studyView.classList.add('hidden');
                tabHome.classList.add('active-tab');
                tabHome.classList.remove('text-gray-400');
                tabStudy.classList.remove('active-tab');
                tabStudy.classList.add('text-gray-400');
                window.scrollTo(0, 0);
            } else {
                homeView.classList.add('hidden');
                studyView.classList.remove('hidden');
                tabStudy.classList.add('active-tab');
                tabStudy.classList.remove('text-gray-400');
                tabHome.classList.remove('active-tab');
                tabHome.classList.add('text-gray-400');
                window.scrollTo(0, 0);
            }
        }

        // 模拟登录
        function mockLogin() {
            showToast("正在跳转至登录中心...");
        }

        // 简易 Toast 实现
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
            }, 2000);
        }

        // 初始化
        window.onload = () => {
            console.log("启盟之光 qmzg-v1.0 已启动");
        }
    </script>
</body>
</html>
