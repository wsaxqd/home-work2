# ============================================================
# 启蒙之光 (QMZG) - 生产环境 Nginx 配置
# 基于邵博士 DevOps 最佳实践
# 功能：HTTPS + Gzip压缩 + 缓存 + 安全头 + 请求限制
# ============================================================

# 限流配置（防止恶意请求）
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;

# HTTP 服务器 - 强制重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name qmzgai.com www.qmzgai.com;

    # 健康检查接口（不重定向）
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt 验证（申请证书时需要）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # 其他所有请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服务器 - 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qmzgai.com www.qmzgai.com;

    # ==================== SSL 证书配置 ====================
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 优化配置
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # 现代加密套件（推荐配置）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # ==================== 安全头配置 ====================
    # HSTS - 强制浏览器使用 HTTPS（1年）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;

    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;

    # XSS 保护
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer 策略
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 内容安全策略（可根据需要调整）
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:; media-src 'self' https:; object-src 'none'; frame-ancestors 'self';" always;

    # ==================== Gzip 压缩配置 ====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        application/font-woff
        application/font-woff2;

    # ==================== 日志配置 ====================
    access_log /var/log/nginx/qmzg-access.log combined;
    error_log /var/log/nginx/qmzg-error.log warn;

    # ==================== 客户端配置 ====================
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ==================== 前端静态文件 ====================
    location / {
        root /var/www/qmzg/app/dist;
        try_files $uri $uri/ /index.html;

        # HTML 文件不缓存（确保更新及时）
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # 静态资源长期缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ==================== API 代理 ====================
    location /api {
        # 请求限流
        limit_req zone=api_limit burst=20 nodelay;

        # 代理到后端服务（Docker 内部）
        proxy_pass http://server:3000;

        # 代理头配置
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓存绕过
        proxy_cache_bypass $http_upgrade;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ==================== WebSocket 支持 ====================
    location /socket.io {
        proxy_pass http://server:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时配置
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # ==================== 上传文件访问 ====================
    location /uploads {
        alias /var/www/qmzg/server/uploads;

        # 安全配置：禁止执行脚本
        location ~* \.(php|jsp|asp|sh|cgi)$ {
            deny all;
        }

        # 图片和文档长期缓存
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==================== 健康检查接口 ====================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ==================== 安全配置 ====================
    # 隐藏 Nginx 版本号
    server_tokens off;

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问备份文件
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================================
# 使用说明
# ============================================================
#
# 1. SSL 证书申请后，将证书文件放到以下位置：
#    - 完整证书链：/etc/nginx/ssl/fullchain.pem
#    - 私钥文件：/etc/nginx/ssl/privkey.pem
#
# 2. 在 Docker 中使用时，需要挂载：
#    volumes:
#      - ./nginx-production.conf:/etc/nginx/conf.d/default.conf:ro
#      - ./ssl:/etc/nginx/ssl:ro
#
# 3. 测试配置：
#    nginx -t
#
# 4. 重载配置：
#    nginx -s reload
#
# 5. 性能优化建议：
#    - 根据实际访问量调整 limit_req_zone
#    - 根据服务器资源调整 proxy_buffers
#    - 监控日志文件大小，定期轮转
#
# ============================================================
